<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Economics Tool</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <div id="app" class="min-h-screen p-6"></div>

  <script>
    let fixedCost = 120;
    let variableCost = 8;
    let marketShare = 50;
    let economies = 40;
    let animationFrame = null;

    function smoothRender() {
      if (animationFrame) cancelAnimationFrame(animationFrame);
      animationFrame = requestAnimationFrame(() => {
        render();
        animationFrame = null;
      });
    }

    function calculateGraph() {
      const demandShift = marketShare * 0.5;
      const arIntercept = 68 + demandShift;
      const mrIntercept = arIntercept;
      const eosRight = economies * 0.28;
      const eosDown = economies * 0.22;

      const baseCentre = 48 + eosRight;
      const baseMinCost = 18 + variableCost * 1.25 - eosDown;
      const fixedCostGap = fixedCost - 120;
      const acMinQ = Math.max(12, Math.min(92, baseCentre + fixedCostGap * 0.13));

      const mcAt = (q) => baseMinCost + 18 * (Math.exp(0.035 * (q - baseCentre)) - 1);
      const minAC = mcAt(acMinQ);
      const acAt = (q) => minAC + Math.pow(q - acMinQ, 2) / 70;
      const arAt = (q) => Math.max(0, arIntercept - q * 0.82);
      const mrAt = (q) => mrIntercept - q * 1.64;

      let q = 1;
      let smallestGap = Infinity;
      for (let i = 1; i <= 95; i += 0.25) {
        const gap = Math.abs(mcAt(i) - mrAt(i));
        if (gap < smallestGap) {
          smallestGap = gap;
          q = i;
        }
      }

      const acAtQ = acAt(q);
      const mcAtQ = mcAt(q);
      const arAtQ = arAt(q);
      const mrAtQ = mrAt(q);

      return {
        q,
        acMinQ,
        minAC,
        acAt,
        mcAt,
        arAt,
        mrAt,
        acAtQ,
        mcAtQ,
        arAtQ,
        mrAtQ,
        profitPerUnit: arAtQ - acAtQ,
        totalProfit: (arAtQ - acAtQ) * q,
      };
    }

    function path(points, x, y, key) {
      return points.map((p, i) => `${i === 0 ? "M" : "L"}${x(p.q)},${y(p[key])}`).join(" ");
    }

    function diagram(graph) {
      const W = 760;
      const H = 480;
      const L = 90;
      const T = 25;
      const B = 55;
      const plotW = W - L - 35;
      const plotH = H - T - B;
      const x = (q) => L + (q / 100) * plotW;
      const y = (p) => T + (1 - p / 100) * plotH;

      const pts = Array.from({ length: 101 }, (_, q) => ({
        q,
        ac: graph.acAt(q),
        mc: graph.mcAt(q),
        ar: graph.arAt(q),
        mr: Math.max(0, graph.mrAt(q)),
      }));

      const qx = x(graph.q);
      const priceY = y(graph.arAtQ);
      const acY = y(graph.acAtQ);
      const mcY = y(graph.mcAtQ);
      const mrY = y(Math.max(0, graph.mrAtQ));
      const acMinX = x(graph.acMinQ);
      const acMinY = y(graph.minAC);

      const profitBox = graph.profitPerUnit > 0
        ? `<rect x="${L}" y="${priceY}" width="${qx - L}" height="${acY - priceY}" fill="rgba(34,197,94,0.18)" stroke="rgba(34,197,94,0.55)" />`
        : `<rect x="${L}" y="${acY}" width="${qx - L}" height="${priceY - acY}" fill="rgba(244,63,94,0.15)" stroke="rgba(244,63,94,0.55)" />`;

      return `
        <div class="overflow-hidden rounded-2xl border bg-white p-3">
          <svg viewBox="0 0 ${W} ${H}" class="h-[430px] w-full">
            <defs>
              <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
                <path d="M0,0 L0,6 L9,3 z" fill="black"></path>
              </marker>
            </defs>

            <line x1="${L}" y1="${H - B}" x2="${W - 20}" y2="${H - B}" stroke="black" stroke-width="3" marker-end="url(#arrow)" />
            <line x1="${L}" y1="${H - B}" x2="${L}" y2="10" stroke="black" stroke-width="3" marker-end="url(#arrow)" />

            <text x="${W - 25}" y="${H - 22}" font-size="28" font-style="italic">Q</text>
            <text x="18" y="30" font-size="16" font-weight="600">Price /</text>
            <text x="18" y="50" font-size="16" font-weight="600">Cost /</text>
            <text x="18" y="70" font-size="16" font-weight="600">Revenue</text>
            <text x="${L + 8}" y="${H - B + 25}" font-size="18">0</text>

            <path d="${path(pts, x, y, "ar")}" fill="none" stroke="black" stroke-width="2.5" />
            <path d="${path(pts, x, y, "mr")}" fill="none" stroke="black" stroke-width="2.5" />
            <path d="${path(pts, x, y, "ac")}" fill="none" stroke="black" stroke-width="2.5" />
            <path d="${path(pts, x, y, "mc")}" fill="none" stroke="black" stroke-width="2.5" />

            ${profitBox}

            <line x1="${qx}" y1="${H - B}" x2="${qx}" y2="${priceY}" stroke="black" stroke-dasharray="5 4" stroke-width="1.5" />
            <line x1="${L}" y1="${priceY}" x2="${qx}" y2="${priceY}" stroke="black" stroke-dasharray="5 4" stroke-width="1.5" />
            <line x1="${L}" y1="${acY}" x2="${qx}" y2="${acY}" stroke="black" stroke-dasharray="5 4" stroke-width="1.5" />
            <line x1="${acMinX}" y1="${H - B}" x2="${acMinX}" y2="${acMinY}" stroke="black" stroke-dasharray="3 4" stroke-width="1" opacity="0.6" />

            <circle cx="${qx}" cy="${priceY}" r="5" fill="black" />
            <circle cx="${qx}" cy="${acY}" r="5" fill="black" />
            <circle cx="${qx}" cy="${mrY}" r="5" fill="black" />
            <circle cx="${qx}" cy="${mcY}" r="5" fill="black" />
            <circle cx="${acMinX}" cy="${acMinY}" r="6" fill="white" stroke="black" stroke-width="2.5" />

            <text x="${x(88)}" y="${y(graph.mcAt(88)) - 8}" font-size="28" font-style="italic">MC</text>
            <text x="${x(90)}" y="${y(graph.acAt(90)) - 8}" font-size="28" font-style="italic">AC</text>
            <text x="${x(92)}" y="${y(graph.arAt(92)) + 18}" font-size="28" font-style="italic">AR</text>
            <text x="${x(55)}" y="${y(Math.max(0, graph.mrAt(55))) + 28}" font-size="28" font-style="italic">MR</text>
            <text x="${acMinX - 18}" y="${acMinY - 10}" font-size="15">AC min</text>
            <text x="${qx - 8}" y="${H - B + 28}" font-size="18">Q*</text>
            <text x="${L - 32}" y="${priceY + 5}" font-size="18">P</text>
            <text x="${L - 34}" y="${acY + 5}" font-size="18">AC</text>
          </svg>
        </div>
      `;
    }

    function explanation() {
      const fc = fixedCost > 120
        ? "Higher fixed cost shifts the AC curve along the unchanged MC curve. AC's lowest point moves rightward/upward while remaining fixed to MC."
        : fixedCost < 120
          ? "Lower fixed cost shifts the AC curve along the unchanged MC curve. AC's lowest point moves leftward/downward while remaining fixed to MC."
          : "Fixed cost is at the base level. AC's lowest point is fixed to the MC curve.";

      const vc = variableCost > 8
        ? "Higher variable cost raises both AC and MC because each unit is now more costly to produce."
        : variableCost < 8
          ? "Lower variable cost reduces both AC and MC because each unit is now cheaper to produce."
          : "Variable cost is at the base level.";

      const ms = marketShare > 50
        ? "Higher market share shifts AR and MR upward/rightward because demand for the firm's product increases."
        : marketShare < 50
          ? "Lower market share shifts AR and MR downward/leftward because demand for the firm's product falls."
          : "Market share is at the base level.";

      const eos = economies > 40
        ? "Stronger economies of scale shift AC and MC rightward and downward, so the firm can produce more output at a lower cost."
        : economies < 40
          ? "Weaker economies of scale mean AC and MC are less right-shifted and remain relatively higher."
          : "Economies of scale are at the base level.";

      return [fc, vc, ms, eos];
    }

    function control(title, id, value, note, min, max, step, examples) {
      return `
        <div class="space-y-3 rounded-2xl border bg-white p-4">
          <div class="flex items-start justify-between gap-4">
            <div>
              <p class="font-semibold">${title}</p>
              <p class="text-xs text-slate-500">${note}</p>
            </div>
            <div class="rounded-xl bg-slate-100 px-3 py-1 text-sm font-bold">${value}</div>
          </div>
          <input id="${id}" type="range" min="${min}" max="${max}" step="${step}" value="${id === "fixedCost" ? fixedCost : id === "variableCost" ? variableCost : id === "marketShare" ? marketShare : economies}" class="w-full accent-slate-800 cursor-pointer" />
          <div class="flex justify-between text-xs text-slate-400"><span>${min}</span><span>${max}</span></div>
          <div class="rounded-xl bg-slate-50 p-3 text-xs text-slate-700">
            <p class="mb-1 font-semibold">Why might this change?</p>
            <ul class="list-disc space-y-1 pl-4">${examples.map(e => `<li>${e}</li>`).join("")}</ul>
          </div>
        </div>
      `;
    }

    function render() {
      const graph = calculateGraph();
      const exp = explanation();
      const profitTone = graph.totalProfit >= 0 ? "bg-emerald-50 border-emerald-200" : "bg-rose-50 border-rose-200";

      document.getElementById("app").innerHTML = `
        <div class="mx-auto max-w-7xl space-y-6">
          <div class="rounded-3xl border bg-white p-6 shadow-sm">
            <p class="text-sm font-semibold uppercase tracking-wide text-slate-500">H2 Economics • Firms and Decisions</p>
            <h1 class="mt-2 text-3xl font-bold">Interactive Economics Tool: Revenue and Cost Changes</h1>
            <p class="mt-2 max-w-3xl text-slate-600">Move the sliders to see how AC, MC, AR and MR respond. The tool identifies the profit-maximising output where MC = MR.</p>
          </div>

          <div class="grid grid-cols-1 gap-6 lg:grid-cols-12">
            <div class="rounded-3xl bg-white shadow-sm lg:col-span-4">
              <div class="space-y-6 p-6">
                <div class="flex items-center justify-between">
                  <h2 class="text-xl font-bold">Controls</h2>
                  <button id="reset" class="rounded-xl border px-4 py-2 text-sm font-semibold hover:bg-slate-100">Reset</button>
                </div>
                ${control("Fixed Cost", "fixedCost", `$${fixedCost.toFixed(0)}`, "Shifts AC; AC minimum moves along MC", 50, 300, 1, ["Rent or lease increases", "New machinery or equipment", "Insurance or licence fees", "Expansion of factory or office space"])}
                ${control("Variable Cost per Unit", "variableCost", `$${variableCost.toFixed(1)}`, "Shifts AC and MC", 2, 20, 0.1, ["Higher wages", "Changes in raw material prices", "Energy or transport costs", "Supplier discounts or shortages"])}
                ${control("Market Share", "marketShare", `${marketShare.toFixed(0)}%`, "Shifts AR and MR", 10, 90, 1, ["More effective advertising", "Better product quality", "Improved distribution", "Competitors losing customers"])}
                ${control("Economies of Scale", "economies", `${economies.toFixed(0)}%`, "Shifts AC and MC rightward/downward", 0, 80, 1, ["Bulk buying discounts", "Specialisation of labour", "Use of advanced technology", "Managerial economies", "Cheaper loans due to firm size"])}
              </div>
            </div>

            <div class="space-y-6 lg:col-span-8">
              <div class="grid grid-cols-2 gap-4 md:grid-cols-4">
                <div class="rounded-3xl bg-white p-4 shadow-sm"><p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Profit-max output</p><p class="mt-2 text-2xl font-bold">Q* = ${graph.q.toFixed(1)}</p></div>
                <div class="rounded-3xl bg-white p-4 shadow-sm"><p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Price / AR</p><p class="mt-2 text-2xl font-bold">$${graph.arAtQ.toFixed(1)}</p></div>
                <div class="rounded-3xl bg-white p-4 shadow-sm"><p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Average Cost</p><p class="mt-2 text-2xl font-bold">$${graph.acAtQ.toFixed(1)}</p></div>
                <div class="rounded-3xl border p-4 shadow-sm ${profitTone}"><p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Profit</p><p class="mt-2 text-2xl font-bold">$${graph.totalProfit.toFixed(0)}</p></div>
              </div>

              <div class="rounded-3xl bg-white shadow-sm">
                <div class="p-6">
                  <h2 class="mb-1 text-xl font-bold">Firm's Cost and Revenue Diagram</h2>
                  <p class="mb-4 text-sm text-slate-600">Profit maximisation occurs where MC = MR. As fixed cost changes, AC slides along the MC curve while its lowest point remains fixed to MC.</p>
                  ${diagram(graph)}
                </div>
              </div>
            </div>
          </div>

          <div class="grid grid-cols-1 gap-6 lg:grid-cols-12">
            <div class="rounded-3xl bg-white shadow-sm lg:col-span-7">
              <div class="p-6">
                <h2 class="text-xl font-bold">Economics Explanation</h2>
                <div class="mt-4 grid gap-3 md:grid-cols-2">
                  ${exp.map(item => `<div class="rounded-2xl border bg-white p-4 text-sm text-slate-700">${item}</div>`).join("")}
                </div>
                <div class="mt-5 rounded-2xl bg-slate-100 p-4 text-sm leading-6 text-slate-700">
                  <strong>Teaching link:</strong> The firm chooses output where MC = MR. The price is then found by moving vertically up to the AR curve. Profit per unit is the gap between AR and AC, while total profit is profit per unit multiplied by output.
                </div>
              </div>
            </div>

            <div class="rounded-3xl bg-slate-950 text-slate-100 shadow-sm lg:col-span-5">
              <div class="p-6">
                <div class="flex items-center justify-between">
                  <h2 class="text-xl font-bold">Live Console</h2>
                  <span class="rounded-full bg-slate-800 px-3 py-1 text-xs text-slate-300">updates instantly</span>
                </div>
                <div class="mt-4 space-y-2 rounded-2xl bg-black p-4 font-mono text-xs leading-5 text-emerald-300">
                  <p><span class="text-slate-500">&gt;</span> Fixed cost = $${fixedCost}</p>
                  <p><span class="text-slate-500">&gt;</span> AC minimum point = Q ${graph.acMinQ.toFixed(1)}, $${graph.minAC.toFixed(1)}</p>
                  <p><span class="text-slate-500">&gt;</span> Fixed cost shifts AC along MC; MC remains separate</p>
                  <p><span class="text-slate-500">&gt;</span> Variable cost per unit = $${variableCost}</p>
                  <p><span class="text-slate-500">&gt;</span> Market share = ${marketShare}%</p>
                  <p><span class="text-slate-500">&gt;</span> Economies of scale = ${economies}%</p>
                  <p><span class="text-slate-500">&gt;</span> Profit maximisation condition: MC = MR</p>
                  <p><span class="text-slate-500">&gt;</span> Q* = ${graph.q.toFixed(1)}</p>
                  <p><span class="text-slate-500">&gt;</span> Price from AR at Q* = $${graph.arAtQ.toFixed(1)}</p>
                  <p><span class="text-slate-500">&gt;</span> AC at Q* = $${graph.acAtQ.toFixed(1)}</p>
                  <p><span class="text-slate-500">&gt;</span> Profit per unit = $${graph.profitPerUnit.toFixed(1)}</p>
                  <p><span class="text-slate-500">&gt;</span> Total profit = $${graph.totalProfit.toFixed(0)}</p>
                  <p><span class="text-slate-500">&gt;</span> ${graph.totalProfit >= 0 ? "Outcome: supernormal profit" : "Outcome: subnormal profit / loss"}</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;

      document.getElementById("fixedCost").oninput = e => { fixedCost = Number(e.target.value); smoothRender(); };
      document.getElementById("variableCost").oninput = e => { variableCost = Number(e.target.value); smoothRender(); };
      document.getElementById("marketShare").oninput = e => { marketShare = Number(e.target.value); smoothRender(); };
      document.getElementById("economies").oninput = e => { economies = Number(e.target.value); smoothRender(); };
      document.getElementById("reset").onclick = () => {
        fixedCost = 120;
        variableCost = 8;
        marketShare = 50;
        economies = 40;
        render();
      };
    }

    render();
  </script>
</body>
</html>
